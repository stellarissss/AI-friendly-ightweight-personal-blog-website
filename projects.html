    <script>
        // ===== 导航栏滚动效果 =====
        const navbar = document.getElementById('navbar');
        const scrollProgress = document.getElementById('scrollProgress');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }

            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            scrollProgress.style.width = scrollPercent + '%';
        });

        // ===== 自定义光标 =====
        const cursorDot = document.getElementById('cursorDot');
        const cursorRing = document.getElementById('cursorRing');

        let mouseX = 0, mouseY = 0;
        let ringX = 0, ringY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';
        });

        function animateRing() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            cursorRing.style.left = ringX + 'px';
            cursorRing.style.top = ringY + 'px';
            requestAnimationFrame(animateRing);
        }
        animateRing();

        function setupCursorHovers() {
            const hoverElements = document.querySelectorAll('a, button, .card, input, textarea');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorRing.classList.add('hover');
                    cursorDot.classList.add('hover');
                });
                el.addEventListener('mouseleave', () => {
                    cursorRing.classList.remove('hover');
                    cursorDot.classList.remove('hover');
                });
            });
        }
        setupCursorHovers();

        // ===== 主题切换 =====
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // ===== 滚动动画 =====
        const revealElements = document.querySelectorAll('.reveal, .text-reveal');

        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        revealElements.forEach(el => observer.observe(el));

        setTimeout(() => {
            document.querySelectorAll('.page-header .reveal, .page-header .text-reveal').forEach(el => {
                el.classList.add('visible');
            });
        }, 100);

        // ===== Markdown 编辑器逻辑 =====
        const input = document.getElementById('md-input');
        const preview = document.getElementById('md-preview');

        // 实时预览功能
        function renderMarkdown() {
            preview.innerHTML = marked.parse(input.value);
        }
        input.addEventListener('input', renderMarkdown);
        renderMarkdown();

        // 1. 包裹选中文本 (加粗、斜体、删除线)
        function formatText(wrap) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const selectedText = input.value.substring(start, end) || "文本";
            const before = input.value.substring(0, start);
            const after = input.value.substring(end);
            
            const newText = wrap + selectedText + wrap;
            input.value = before + newText + after;
            
            // 重新选中刚刚包裹的文本
            input.focus();
            input.selectionStart = start;
            input.selectionEnd = start + newText.length;
            renderMarkdown();
        }

        // 2. 行首插入前缀 (标题、引用、列表)
        function insertLinePrefix(prefix) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const selectedText = input.value.substring(start, end);
            const before = input.value.substring(0, start);
            const after = input.value.substring(end);
            
            const newText = prefix + selectedText;
            input.value = before + newText + after;
            
            input.focus();
            input.selectionStart = start;
            input.selectionEnd = start + newText.length;
            renderMarkdown();
        }

        // 3. 插入链接
        function formatLink() {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const selectedText = input.value.substring(start, end) || "链接文本";
            const before = input.value.substring(0, start);
            const after = input.value.substring(end);
            
            const newText = `[${selectedText}](https://)`;
            input.value = before + newText + after;
            
            input.focus();
            // 将光标定位到括号内，方便直接填链接
            input.selectionStart = start + newText.length - 1;
            input.selectionEnd = start + newText.length - 1;
            renderMarkdown();
        }

        // 复制功能
        function copyMarkdown() {
            input.select();
            document.execCommand('copy');
            alert('Markdown 内容已复制到剪贴板！');
        }

        // 下载功能
        function downloadMarkdown() {
            const text = input.value;
            const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'new-post.md';
            link.click();
        }

    function formatSize(b){
    if(b < 1024) return b + ' B';
    if(b < 1048576) return (b/1024).toFixed(1) + ' KB';
    if(b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
    return (b/1073741824).toFixed(2) + ' GB';
}
function formatDate(ts){
    const d = new Date(ts * 1000);
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}
fetch('/list.php')
    .then(r => r.json())
    .then(files => {
        const box = document.getElementById('cloud-files');
        if(!files.length){
            box.innerHTML = '<p class="status-msg">暂无文件</p>';
            return;
        }
        box.innerHTML = files.map(f => `
            <article class="card">
                <div class="meta">${formatDate(f.time)} ·${formatSize(f.size)}</div>
            	<h3><a href="/download.php?f=${encodeURIComponent(f.name)}" download>${f.name}</a></h3>
            	<p>点击下载</p>
            </article>
        `).join('');
        setupCursorHovers();
    })
    .catch(() => {
        document.getElementById('cloud-files').innerHTML = '<p class="error-msg">加载失败，请稍后重试</p>';
    });
    </script>
