<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - stellaric.site</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0c0a09;
    color: #fafaf9;
    font-family: 'IBM Plex Mono', 'SF Mono', Menlo, Consolas, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 24px;
    overflow-x: hidden;
    position: relative;
  }

  /* Matrix 背景画布 */
  #matrix-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    opacity: 0.15;
    pointer-events: none;
  }

  /* 全局抖动效果 */
  .glitch-screen {
    animation: glitch-screen 0.4s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes glitch-screen {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    20%, 80% { transform: translate3d(4px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
    40%, 60% { transform: translate3d(8px, 0, 0); }
  }

  .terminal {
    max-width: 720px;
    width: 100%;
    margin: auto;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(2px);
    border: 1px solid #1a1a1a;
    padding: 32px;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
  }
  
  .title {
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 1;
    margin-bottom: 8px;
    position: relative;
    color: #fafafa;
    animation: glitch 3s infinite;
  }
  @keyframes glitch {
    0%, 90%, 100% { transform: none; text-shadow: none; }
    92% { transform: translateX(-2px); text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9; }
    94% { transform: translateX(2px); text-shadow: -2px 0 #ff00c1, 2px 0 #00fff9; }
    96% { transform: none; text-shadow: none; }
  }
  
  .subtitle {
    color: #737373;
    font-size: 0.9rem;
    margin-bottom: 32px;
    border-bottom: 1px solid #262626;
    padding-bottom: 16px;
  }
  
  .output {
    color: #a3a3a3;
    font-size: 0.88rem;
    line-height: 1.8;
    margin-bottom: 24px;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 180px;
  }
  .output .line { 
    margin-bottom: 4px; 
    opacity: 0;
    animation: fadeIn 0.3s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  
  .output .accent { color: #fafafa; }
  .output .dim { color: #525252; }
  
  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: #fafafa;
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  
  .input-line {
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid #262626;
    padding-top: 16px;
  }
  
  .prompt {
    color: #fafafa;
    font-size: 0.88rem;
    flex-shrink: 0;
  }
  .prompt .user { color: #fafafa; }
  .prompt .at { color: #525252; }
  .prompt .host { color: #a3a3a3; }
  .prompt .path { color: #525252; }
  
  .input-container {
    position: relative;
    flex: 1;
    height: 20px;
  }
  
  #cmd-input {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: #fafafa; /* 这里改回白色，让打出的字可见 */
    font-family: inherit;
    font-size: 0.88rem;
    caret-color: transparent; /* 这行保留，用来隐藏系统自带的光标 */
    z-index: 2;
  }
  
  #measure-span {
    position: absolute;
    visibility: hidden;
    white-space: pre;
    font-size: 0.88rem;
  }
  
  .custom-cursor {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 16px;
    background: #fafafa;
    animation: blink 1s step-end infinite;
    pointer-events: none;
    transition: left 0.05s ease-out;
    z-index: 1;
  }
  
  .btns {
    display: flex;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid #404040;
    color: #fafafa;
    font-family: inherit;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 220ms;
    text-decoration: none;
    background: transparent;
  }
  
  .btn:hover {
    background: #fafafa;
    color: #0a0a0a;
    border-color: #fafafa;
    box-shadow: 2px 2px 0px rgba(255,255,255,0.2);
  }
  
  .hint {
    margin-top: 16px;
    color: #525252;
    font-size: 0.76rem;
  }
  
  @media (max-width: 640px) {
    body { padding: 24px 16px; }
    .terminal { padding: 20px; }
    .title { font-size: 3.5rem; }
  }
</style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>

<div class="terminal">
  <div class="title">404</div>
  <div class="subtitle">PAGE_NOT_FOUND // 这个页面不存在或已被移除</div>

  <div class="output" id="output">
    <!-- 初始内容将由JS动态生成以实现打字机效果 -->
  </div>

  <div class="input-line">
    <span class="prompt">
      <span class="user">visitor</span><span class="at">@</span><span class="host">stellaric</span>:<span class="path">~</span>$
    </span>
    <div class="input-container">
      <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
      <span id="measure-span"></span>
      <span class="custom-cursor" id="custom-cursor"></span>
    </div>
  </div>

  <div class="btns">
    <a href="/" class="btn">← 返回首页</a>
    <a href="/blog.html" class="btn">博客</a>
    <a href="/guestbook.html" class="btn">留言板</a>
  </div>
  <div class="hint">提示：试试输入 whoami / ls / sudo / help</div>
</div>

<script>
const input = document.getElementById('cmd-input');
const output = document.getElementById('output');
const cursor = document.getElementById('custom-cursor');
const measureSpan = document.getElementById('measure-span');

// ================= 矩阵雨背景 =================
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = "太原蒼天已死黃天當立歲在甲子天下大吉王侯將相寧有種乎".split("");
const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#0F0';
  ctx.font = fontSize + 'px monospace';
  
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

// ================= 终端逻辑 =================
const commands = {
  help: [
    '可用命令：',
    '  help     - 显示这个帮助',
    '  home     - 返回首页',
    '  back     - 返回上一页',
    '  blog     - 去博客',
    '  whoami   - 你是谁',
    '  ls       - 列出网站页面',
    '  sudo     - 尝试获取管理员权限（笑）',
    '  hi       - 打个招呼',
    '  clear    - 清屏',
    '  exit     - 离开'
  ].join('\n'),
  whoami: '你是第 ' + Math.floor(Math.random()*9000+1000) + ' 个迷路到这里的访客。坐标未知，意识在线。',
  ls: 'index.html  blog.html  projects.html\nguestbook.html  posts/  style.css\n\n(你访问的那个文件不在这里。)',
  hi: '你好呀 👋 我是常乐天网站里的一个终端。你迷路了？',
  sudo: 'permission denied: 你不是常乐天本人 :)',
  exit: '拜拜！正在尝试关闭这个标签页...（其实关不了，你走吧）',
  '': ''
};

// 打字机效果打印
async function typeLine(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  output.appendChild(div);
  
  for (let i = 0; i < text.length; i++) {
    div.textContent += text[i];
    // 遇到换行符特殊处理
    if (text[i] === '\n') {
      div.innerHTML = div.textContent.replace(/\n/g, '<br>');
    }
    await new Promise(r => setTimeout(r, 15)); // 打字速度
  }
  // 确保多行文本最后的HTML正确
  if (text.includes('\n')) {
    div.innerHTML = div.textContent.replace(/\n/g, '<br>');
  }
  window.scrollTo(0, document.body.scrollHeight);
}

// 快速打印（带高亮）
function printHTML(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  div.style.animation = 'fadeIn 0.3s forwards';
  output.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

// 初始化打字机输出
async function initTerminal() {
  await new Promise(r => setTimeout(r, 500));
  await typeLine('$ init stellaric-shell v1.0', 'dim');
  await typeLine('> 正在分析请求路径...', 'dim');
  await typeLine('> 结果：该页面不存在于这个宇宙', '');
  await typeLine('> 但你既然来了，不如和这个终端聊聊？', '');
  await typeLine('> 输入 help 查看可用命令', 'dim');
  
  const br = document.createElement('br');
  output.appendChild(br);
}

initTerminal();

// ================= 输入框光标跟随 =================
function updateCursor() {
  measureSpan.textContent = input.value;
  const inputRect = input.getBoundingClientRect();
  const measureRect = measureSpan.getBoundingClientRect();
  // 光标相对于容器定位
  cursor.style.left = (measureRect.width) + 'px';
}

input.addEventListener('input', updateCursor);
input.addEventListener('focus', () => cursor.style.display = 'block');
input.addEventListener('blur', () => cursor.style.display = 'none');

// ================= 命令处理 =================
input.addEventListener('keydown', async function(e) {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    printHTML('<span class="dim">$</span> ' + cmd);
    input.value = '';
    updateCursor();

    if (cmd === 'help') {
      await typeLine(commands.help);
    } else if (cmd === 'home') {
      await typeLine('正在跳转首页...');
      setTimeout(() => location.href = '/', 600);
    } else if (cmd === 'back') {
      await typeLine('正在返回上一页...');
      setTimeout(() => history.back(), 600);
    } else if (cmd === 'blog') {
      await typeLine('正在前往博客...');
      setTimeout(() => location.href = '/blog.html', 600);
    } else if (cmd === 'whoami' || cmd === 'ls' || cmd === 'hi' || cmd === 'exit') {
      await typeLine(commands[cmd]);
    } else if (cmd === 'sudo') {
      // 触发屏幕抖动效果
      document.body.classList.add('glitch-screen');
      setTimeout(() => document.body.classList.remove('glitch-screen'), 400);
      await typeLine(commands.sudo);
    } else if (cmd === 'clear') {
      output.innerHTML = '';
    } else if (cmd === '') {
      // 空命令
    } else if (cmd === 'rm -rf /') {
      await typeLine('nice try 😏 但这个网站是静态的，你删不掉的。');
    } else if (cmd.startsWith('cd ')) {
      await typeLine('cd: 没有那个目录：' + cmd.slice(3) + ' （你在浏览器里，不能 cd）');
    } else {
      await typeLine('command not found: ' + cmd + '  (输入 help 查看可用命令)');
    }
  }
});

// 点击页面任意位置聚焦输入框
document.addEventListener('click', (e) => {
  if (e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON') {
    input.focus();
  }
});

// 初始更新光标位置
setTimeout(updateCursor, 100);
</script>
</body>
</html>
