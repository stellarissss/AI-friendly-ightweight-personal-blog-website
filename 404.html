<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - stellaric.site</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 40px 24px;
    overflow-x: hidden;
  }

  .terminal-window {
    max-width: 720px;
    width: 100%;
    margin: auto;
  }

  .title {
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 700;
    letter-spacing: -0.05em;
    line-height: 1;
    margin-bottom: 8px;
    position: relative;
    color: var(--fg);
    display: inline-block;
  }
  .title::before,
  .title::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  .title::before {
    color: var(--magenta);
    animation: glitch-1 3s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    transform: translate(-2px, 0);
    opacity: 0.8;
  }
  .title::after {
    color: var(--cyan);
    animation: glitch-2 2.5s infinite;
    clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    transform: translate(2px, 0);
    opacity: 0.8;
  }

  .subtitle {
    color: var(--fg-4);
    font-size: 0.85rem;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
  }

  .output {
    color: var(--fg-2);
    font-size: 0.85rem;
    line-height: 1.8;
    margin-bottom: 20px;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 180px;
  }
  .output .line {
    margin-bottom: 4px;
    opacity: 0;
    animation: fadeIn 0.3s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .output .accent { color: var(--fg); }
  .output .dim { color: var(--fg-4); }
  .output .cyan { color: var(--cyan); }
  .output .magenta { color: var(--magenta); }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background: var(--fg);
    vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .input-line {
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }

  .prompt {
    color: var(--fg);
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .prompt .user { color: var(--green); }
  .prompt .at { color: var(--fg-4); }
  .prompt .host { color: var(--fg-2); }
  .prompt .path { color: var(--cyan); }

  .input-container {
    position: relative;
    flex: 1;
    height: 20px;
  }

  #cmd-input {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-family: inherit;
    font-size: 0.85rem;
    caret-color: transparent;
    z-index: 2;
  }

  #measure-span {
    position: absolute;
    visibility: hidden;
    white-space: pre;
    font-size: 0.85rem;
  }

  .custom-cursor {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 16px;
    background: var(--cyan);
    animation: blink 1s step-end infinite;
    pointer-events: none;
    transition: left 0.05s ease-out;
    z-index: 1;
    box-shadow: 0 0 8px var(--cyan);
  }

  .btns {
    display: flex;
    gap: 12px;
    margin-top: 22px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1px solid var(--line-2);
    color: var(--fg);
    font-family: inherit;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all var(--t);
    text-decoration: none;
    background: transparent;
    border-radius: 4px;
  }

  .btn:hover {
    background: var(--cyan);
    color: var(--bg);
    border-color: var(--cyan);
    box-shadow: 0 0 15px rgba(0, 255, 249, 0.3);
  }

  .hint {
    margin-top: 16px;
    color: var(--fg-4);
    font-size: 0.72rem;
  }

  .glitch-screen {
    animation: glitch-screen 0.4s cubic-bezier(.36,.07,.19,.97) both;
  }
  @keyframes glitch-screen {
    10%, 90% { transform: translate3d(-2px, 0, 0); }
    20%, 80% { transform: translate3d(4px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-8px, 0, 0); }
    40%, 60% { transform: translate3d(8px, 0, 0); }
  }

  @media (max-width: 640px) {
    body { padding: 24px 16px; }
    .terminal-body { padding: 1.25rem; }
    .title { font-size: 3.5rem; }
  }
</style>
</head>
<body class="scanlines">
<canvas id="particle-canvas"></canvas>

<div class="terminal-window">
  <div class="terminal-header">
    <span class="terminal-dot red"></span>
    <span class="terminal-dot yellow"></span>
    <span class="terminal-dot green"></span>
    <span class="terminal-title">stellaris-shell — 404</span>
  </div>
  <div class="terminal-body">
    <div class="title" data-text="404">404</div>
    <div class="subtitle">PAGE_NOT_FOUND // 这个页面不存在或已被移除</div>

    <div class="output" id="output">
    </div>

    <div class="input-line">
      <span class="prompt">
        <span class="user">visitor</span><span class="at">@</span><span class="host">stellaric</span>:<span class="path">~</span>$
      </span>
      <div class="input-container">
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
        <span id="measure-span"></span>
        <span class="custom-cursor" id="custom-cursor"></span>
      </div>
    </div>

    <div class="btns">
      <a href="/" class="btn">← 返回首页</a>
      <a href="/blog.html" class="btn">博客</a>
      <a href="/guestbook.html" class="btn">留言板</a>
    </div>
    <div class="hint">提示：试试输入 whoami / ls / sudo / help</div>
  </div>
</div>

<script>
const input = document.getElementById('cmd-input');
const output = document.getElementById('output');
const cursor = document.getElementById('custom-cursor');
const measureSpan = document.getElementById('measure-span');

const commands = {
  help: [
    '可用命令：',
    '  help     - 显示这个帮助',
    '  home     - 返回首页',
    '  back     - 返回上一页',
    '  blog     - 去博客',
    '  whoami   - 你是谁',
    '  ls       - 列出网站页面',
    '  sudo     - 尝试获取管理员权限（笑）',
    '  hi       - 打个招呼',
    '  clear    - 清屏',
    '  exit     - 离开'
  ].join('\n'),
  whoami: '你是第 ' + Math.floor(Math.random()*9000+1000) + ' 个迷路到这里的访客。坐标未知，意识在线。',
  ls: 'index.html  blog.html  projects.html\nguestbook.html  posts/  style.css\n\n(你访问的那个文件不在这里。)',
  hi: '你好呀 👋 我是常乐天网站里的一个终端。你迷路了？',
  sudo: 'permission denied: 你不是常乐天本人 :)',
  exit: '拜拜！正在尝试关闭这个标签页...（其实关不了，你走吧）',
  '': ''
};

async function typeLine(text, cls = '') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  output.appendChild(div);

  for (let i = 0; i < text.length; i++) {
    div.textContent += text[i];
    if (text[i] === '\n') {
      div.innerHTML = div.textContent.replace(/\n/g, '<br>');
    }
    await new Promise(r => setTimeout(r, 15));
  }
  if (text.includes('\n')) {
    div.innerHTML = div.textContent.replace(/\n/g, '<br>');
  }
  window.scrollTo(0, document.body.scrollHeight);
}

function printHTML(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  div.style.animation = 'fadeIn 0.3s forwards';
  output.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

async function initTerminal() {
  await new Promise(r => setTimeout(r, 500));
  await typeLine('$ init stellaric-shell v2.0', 'dim');
  await typeLine('> 正在分析请求路径...', 'dim');
  await typeLine('> 结果：该页面不存在于这个宇宙', 'cyan');
  await typeLine('> 但你既然来了，不如和这个终端聊聊？', '');
  await typeLine('> 输入 help 查看可用命令', 'dim');

  const br = document.createElement('br');
  output.appendChild(br);
}

initTerminal();

function updateCursor() {
  measureSpan.textContent = input.value;
  const inputRect = input.getBoundingClientRect();
  const measureRect = measureSpan.getBoundingClientRect();
  cursor.style.left = (measureRect.width) + 'px';
}

input.addEventListener('input', updateCursor);
input.addEventListener('focus', () => cursor.style.display = 'block');
input.addEventListener('blur', () => cursor.style.display = 'none');

input.addEventListener('keydown', async function(e) {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    printHTML('<span class="dim">$</span> ' + cmd);
    input.value = '';
    updateCursor();

    if (cmd === 'help') {
      await typeLine(commands.help);
    } else if (cmd === 'home') {
      await typeLine('正在跳转首页...');
      setTimeout(() => location.href = '/', 600);
    } else if (cmd === 'back') {
      await typeLine('正在返回上一页...');
      setTimeout(() => history.back(), 600);
    } else if (cmd === 'blog') {
      await typeLine('正在前往博客...');
      setTimeout(() => location.href = '/blog.html', 600);
    } else if (cmd === 'whoami' || cmd === 'ls' || cmd === 'hi' || cmd === 'exit') {
      await typeLine(commands[cmd]);
    } else if (cmd === 'sudo') {
      document.body.classList.add('glitch-screen');
      setTimeout(() => document.body.classList.remove('glitch-screen'), 400);
      await typeLine(commands.sudo);
    } else if (cmd === 'clear') {
      output.innerHTML = '';
    } else if (cmd === '') {
    } else if (cmd === 'rm -rf /') {
      await typeLine('nice try 😏 但这个网站是静态的，你删不掉的。');
    } else if (cmd.startsWith('cd ')) {
      await typeLine('cd: 没有那个目录：' + cmd.slice(3) + ' （你在浏览器里，不能 cd）');
    } else {
      await typeLine('command not found: ' + cmd + '  (输入 help 查看可用命令)');
    }
  }
});

document.addEventListener('click', (e) => {
  if (e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON') {
    input.focus();
  }
});

setTimeout(updateCursor, 100);
</script>
<script src="bg-particles.js"></script>
</body>
</html>
