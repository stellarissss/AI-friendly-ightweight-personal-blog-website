<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 初始标题，后续JS会根据文章的一级标题自动替换 -->
    <title>文章加载中... | 常乐天</title>
    <meta name="description" content="常乐天的博客文章。">
    <meta name="author" content="常乐天">

    <link rel="stylesheet" href="style.css">

    <!-- 引入 Markdown 渲染库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- 给 AI 看的文章结构化数据，会随着页面内容动态更新 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BlogPosting",
      "headline": "常乐天的博客文章",
      "author": {
        "@type": "Person",
        "name": "常乐天",
        "alumniOf": "太原师院附中"
      }
    }
    </script>
</head>
<body>
    <!-- 滚动进度条 -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- 自定义光标 -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-brand"><a href="index.html">stellaris's BLOG</a></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="blog.html" class="active">博客</a>
                <a href="projects.html">小项目</a>
                <a href="guestbook.html">留言板</a>
                <button class="theme-toggle" id="themeToggle" title="切换主题">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <article id="markdown-content" class="reveal">
            <p>文章加载中...</p>
        </article>

        <a href="blog.html" class="back-link">
            <span class="arrow">←</span>
            <span>返回博客列表</span>
        </a>

        <footer style="margin-top: 4rem;">
            <div class="foot-line">
                <span>© 2024 SYFZ 2509 常乐天</span>
                <span>POWERED BY CLOUDFLARE PAGES</span>
            </div>
        </footer>
    </div>

    <script>
        // ===== 导航栏滚动效果 =====
        const navbar = document.getElementById('navbar');
        const scrollProgress = document.getElementById('scrollProgress');

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }

            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            scrollProgress.style.width = scrollPercent + '%';
        });

        // ===== 自定义光标 =====
        const cursorDot = document.getElementById('cursorDot');
        const cursorRing = document.getElementById('cursorRing');

        let mouseX = 0, mouseY = 0;
        let ringX = 0, ringY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursorDot.style.left = mouseX + 'px';
            cursorDot.style.top = mouseY + 'px';
        });

        function animateRing() {
            ringX += (mouseX - ringX) * 0.15;
            ringY += (mouseY - ringY) * 0.15;
            cursorRing.style.left = ringX + 'px';
            cursorRing.style.top = ringY + 'px';
            requestAnimationFrame(animateRing);
        }
        animateRing();

        function setupCursorHovers() {
            const hoverElements = document.querySelectorAll('a, button, .card, input, textarea');
            hoverElements.forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursorRing.classList.add('hover');
                    cursorDot.classList.add('hover');
                });
                el.addEventListener('mouseleave', () => {
                    cursorRing.classList.remove('hover');
                    cursorDot.classList.remove('hover');
                });
            });
        }
        setupCursorHovers();

        // ===== 主题切换 =====
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // ===== 滚动动画 =====
        const revealElements = document.querySelectorAll('.reveal');

        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        revealElements.forEach(el => observer.observe(el));

        // 获取 URL 参数中的文件路径，例如 ?file=posts/how-to-build-this-site.md
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if (fileName) {
            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error('文章走丢了...');
                    return response.text();
                })
                .then(markdownText => {
                    // 渲染 Markdown 为 HTML
                    document.getElementById('markdown-content').innerHTML = marked.parse(markdownText);

                    // 动态修改网页标题，对 SEO 和 AI 抓取极其重要
                    const h1 = document.querySelector('#markdown-content h1');
                    if (h1) {
                        document.title = h1.innerText + " | 常乐天";

                        // 同步更新 meta description（取首段）
                        const firstP = document.querySelector('#markdown-content p');
                        if (firstP) {
                            let metaDesc = document.querySelector('meta[name="description"]');
                            if (metaDesc) metaDesc.setAttribute('content', firstP.innerText.slice(0, 120));
                        }

                        // 同步更新 JSON-LD headline
                        const ld = document.querySelector('script[type="application/ld+json"]');
                        if (ld) {
                            try {
                                const data = JSON.parse(ld.textContent);
                                data.headline = h1.innerText;
                                if (firstP) data.description = firstP.innerText.slice(0, 120);
                                ld.textContent = JSON.stringify(data, null, 2);
                            } catch (e) { /* ignore */ }
                        }
                    }

                    // 重新设置光标 hover 监听（因为新内容添加了链接）
                    setupCursorHovers();
                })
                .catch(error => {
                    document.getElementById('markdown-content').innerHTML =
                        `<p style="color:var(--fg);">${error.message}</p>`;
                });
        } else {
            document.getElementById('markdown-content').innerHTML = `<p>未找到文章内容。</p>`;
        }
    </script>
</body>
</html>
