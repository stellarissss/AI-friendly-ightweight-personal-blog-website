<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章加载中... | 常乐天</title>
    <meta name="description" content="常乐天的博客文章。">
    <meta name="author" content="常乐天">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="scanlines">
    <canvas id="particle-canvas"></canvas>

    <nav>
        <div class="nav-container">
            <div class="nav-brand"><a href="index.html">stellaris@home:~/posts</a></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="blog.html" class="active">博客</a>
                <a href="projects.html">项目</a>
                <a href="guestbook.html">留言板</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="terminal-window fade-in">
            <div class="terminal-header">
                <span class="terminal-dot red"></span>
                <span class="terminal-dot yellow"></span>
                <span class="terminal-dot green"></span>
                <span class="terminal-title" id="terminal-title">article.md</span>
            </div>
            <div class="terminal-body">
                <article id="markdown-content">
                    <p>文章加载中...</p>
                </article>
            </div>
        </div>

        <a href="blog.html" class="back-link">
            <span class="arrow">←</span>
            <span>返回博客列表</span>
        </a>

        <footer style="margin-top: 3rem;">
            <div class="foot-line">
                <span>© 2026 SYFZ 2509 常乐天</span>
                <span>READ MODE</span>
            </div>
        </footer>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileName = urlParams.get('file');

        if (fileName) {
            const name = fileName.split('/').pop() || 'article.md';
            document.getElementById('terminal-title').textContent = name;

            fetch(fileName)
                .then(response => {
                    if (!response.ok) throw new Error('文章走丢了...');
                    return response.text();
                })
                .then(markdownText => {
                    document.getElementById('markdown-content').innerHTML = marked.parse(markdownText);

                    const h1 = document.querySelector('#markdown-content h1');
                    if (h1) {
                        document.title = h1.innerText + " | 常乐天";
                        const firstP = document.querySelector('#markdown-content p');
                        if (firstP) {
                            let metaDesc = document.querySelector('meta[name="description"]');
                            if (metaDesc) metaDesc.setAttribute('content', firstP.innerText.slice(0, 120));
                        }
                    }
                })
                .catch(error => {
                    document.getElementById('markdown-content').innerHTML =
                        `<p style="color:var(--magenta);">${error.message}</p>`;
                });
        } else {
            document.getElementById('markdown-content').innerHTML = `<p>未找到文章内容。</p>`;
        }
    </script>
    <script src="bg-particles.js"></script>
</body>
</html>
